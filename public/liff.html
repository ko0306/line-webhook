<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認証中...</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    .message {
      text-align: center;
      color: #333;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ccc;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <p>認証中です。しばらくお待ちください...</p>
  </div>
  <script>
    liff.init({ liffId: '2009734205-wWWdTXIP' })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        return liff.sendMessages([{ type: 'text', text: 'メール認証' }]);
      })
      .then(() => {
        liff.closeWindow();
      })
      .catch((err) => {
        console.error(err);
        document.querySelector('.message p').textContent = 'エラーが発生しました。LINEを開いて「メール認証」と送信してください。';
      });
  </script>
</body>
</html>
