<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OZONOIX</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Hiragino Kaku Gothic ProN",sans-serif;background:#f5f7fa;color:#333;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .spinner{width:40px;height:40px;border:4px solid #ccc;border-top-color:#06C755;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .center{text-align:center;color:#555;font-size:14px}
    /* 規約・プランページ */
    #plan-page{display:none;width:100%;max-width:480px}
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
    h2{font-size:16px;font-weight:bold;color:#06C755;margin-bottom:12px;border-bottom:2px solid #06C755;padding-bottom:6px}
    .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
    .row:last-child{border-bottom:none}
    .label{color:#888;flex-shrink:0;margin-right:8px}
    .value{font-weight:bold;text-align:right;word-break:break-all}
    .btn{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:10px;text-align:center}
    .btn-green{background:#06C755;color:#fff}
    .btn-outline{background:#fff;color:#06C755;border:2px solid #06C755}
    .btn-red{background:#fff;color:#e00;border:2px solid #e00}
    .agreement{font-size:12px;color:#888;text-decoration:underline;display:block;margin:4px 0}
  </style>
</head>
<body>
  <!-- ローディング -->
  <div id="loading" class="center">
    <div class="spinner"></div>
    <p>認証中です。しばらくお待ちください...</p>
  </div>

  <!-- 規約・プランページ -->
  <div id="plan-page">
    <div class="card">
      <h2>📋 ご契約情報</h2>
      <div id="info-rows"></div>
    </div>
    <div class="card">
      <h2>📝 同意事項</h2>
      <a class="agreement" href="https://harurururun.github.io/company-OZONONIX/" target="_blank">個人情報保護方針</a>
      <a class="agreement" href="https://harurururun.github.io/company-OZONONIX/" target="_blank">特定商取引法に基づく表記</a>
      <a class="agreement" href="https://harurururun.github.io/company-OZONONIX/" target="_blank">利用規約</a>
    </div>
    <div class="card">
      <h2>⚙️ 操作</h2>
      <button class="btn btn-outline" onclick="sendMsg('情報変更')">情報を変更する</button>
      <button id="plan-change-btn" class="btn btn-outline" onclick="sendMsg('プラン変更')" style="display:none">プランを変更する</button>
      <button class="btn btn-red" onclick="sendMsg('退会手続き')">退会はこちら</button>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpz3kErJFUl-p5nB65ic0-hZZDGTGSl9VzOukOwplo6u-IvlOHZX_CX6EpBo-KdRuV/exec';
    const LIFF_ID = '2009734205-wWWdTXIP';

    // URLパラメータ取得（liff.stateも考慮）
    function getPage() {
      const search = window.location.search + window.location.hash;
      if (search.includes('page=plan')) return 'plan';
      // liff.state パラメータにも含まれる場合
      const liffState = new URLSearchParams(window.location.search).get('liff.state');
      if (liffState && liffState.includes('page=plan')) return 'plan';
      return 'auth';
    }

    function sendMsg(text) {
      liff.sendMessages([{ type: 'text', text }])
        .then(() => liff.closeWindow())
        .catch(err => alert('エラーが発生しました: ' + err.message));
    }

    liff.init({ liffId: LIFF_ID })
      .then(async () => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const page = getPage();

        if (page === 'plan') {
          // 規約・プランページ
          const userId = liff.getContext().userId;
          const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getUserInfo', lineUserId: userId }),
          });
          const data = await res.json();

          document.getElementById('loading').style.display = 'none';
          document.getElementById('plan-page').style.display = 'block';

          if (data.success && !data.withdrawn) {
            const rows = [
              ['メールアドレス', data.email],
              ['ご利用サービス', data.inquiry],
              data.plan ? ['プラン', data.plan] : null,
              data.trial ? ['無料トライアル', data.trial] : null,
              data.budget ? ['ご予算', data.budget] : null,
            ].filter(Boolean);

            document.getElementById('info-rows').innerHTML = rows
              .map(([k, v]) => `<div class="row"><span class="label">${k}</span><span class="value">${v || '未設定'}</span></div>`)
              .join('');

            // シフトアプリならプラン変更ボタンを表示
            if (data.inquiry && data.inquiry.includes('シフト')) {
              document.getElementById('plan-change-btn').style.display = 'block';
            }
          } else if (data.withdrawn) {
            document.getElementById('info-rows').innerHTML = '<div class="row"><span>退会済みのアカウントです。</span></div>';
          } else {
            document.getElementById('info-rows').innerHTML = '<div class="row"><span>ご契約情報が見つかりません。<br>LINEでメールアドレスをお送りください。</span></div>';
          }
        } else {
          // メール認証ページ（デフォルト）
          await liff.sendMessages([{ type: 'text', text: 'メール認証' }]);
          liff.closeWindow();
        }
      })
      .catch(err => {
        document.querySelector('#loading p').textContent = 'エラーが発生しました。LINEを開いて操作してください。';
        console.error(err);
      });
  </script>
</body>
</html>
